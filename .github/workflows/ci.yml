name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-regress:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            binutils-riscv64-unknown-elf \
            gcc-riscv64-unknown-elf \
            make \
            opensbi \
            python3 \
            qemu-system-misc

      - name: Build
        run: make clean build

      - name: Run regression
        run: make regression

      - name: Run disk regression
        run: make disk-regression
